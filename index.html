<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>헤테로 자기소개표표</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Serif+KR:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

/* ── 테마 변수 ── */
:root {
  --paper:   #faf8f4;
  --ink:     #1e1a12;
  --rule:    #1e1a12;
  --sub:     #7a6a58;
  --muted:   #9a8878;
  --tint:    #c8b898;
  --tint2:   #ede8e0;
  --accent:  #1e1a12;
}
.t-rose      { --paper:#fff8f8; --ink:#2a1018; --rule:#2a1018; --sub:#8a5a60; --muted:#c09098; --tint:#e8c0c8; --tint2:#faeaec; --accent:#a03050; }
.t-lavender  { --paper:#f9f8ff; --ink:#1a1828; --rule:#1a1828; --sub:#5a5080; --muted:#9090c0; --tint:#c8c0e0; --tint2:#eeeaff; --accent:#4840a0; }
.t-mint      { --paper:#f6faf8; --ink:#101e18; --rule:#101e18; --sub:#3a6050; --muted:#70a890; --tint:#a8d0c0; --tint2:#dff0e8; --accent:#207858; }
.t-peach     { --paper:#fff9f4; --ink:#281808; --rule:#281808; --sub:#805030; --muted:#c09070; --tint:#e8c8a0; --tint2:#fff0e0; --accent:#b06020; }
.t-mono      { --paper:#ffffff; --ink:#111111; --rule:#111111; --sub:#555555; --muted:#999999; --tint:#cccccc; --tint2:#f0f0f0; --accent:#222222; }
.t-blue      { --paper:#f6f8ff; --ink:#0e1a2e; --rule:#0e1a2e; --sub:#2a4a78; --muted:#6888b8; --tint:#a8c0e0; --tint2:#dce8f8; --accent:#1a50a0; }

body {
  background: #ccc8c0;
  font-family: 'Noto Sans KR', sans-serif;
  min-height: 100vh;
  padding: 24px 20px 40px;
}

/* ── 컨트롤 바 ── */
#ctrl {
  max-width: 860px;
  margin: 0 auto 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}
.ctrl-lbl { font-size: 10px; font-weight: 700; letter-spacing: .14em; color: #6a6060; text-transform: uppercase; }
.tdots { display: flex; gap: 6px; }
.tdot {
  width: 20px; height: 20px;
  border-radius: 50%;
  cursor: pointer;
  border: 2px solid transparent;
  transition: border-color .12s;
  flex-shrink: 0;
}
.tdot.on { border-color: #333; }
.tdot[data-t="default"]   { background: #c8b898; }
.tdot[data-t="rose"]      { background: #e8a0b0; }
.tdot[data-t="lavender"]  { background: #a8a0d0; }
.tdot[data-t="mint"]      { background: #80c0a8; }
.tdot[data-t="peach"]     { background: #d8a878; }
.tdot[data-t="blue"]      { background: #6090d0; }
.tdot[data-t="mono"]      { background: #888888; }
.btn-save {
  margin-left: auto;
  padding: 6px 18px;
  border: 1px solid #888;
  background: #fff;
  color: #333;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .1em;
  text-transform: uppercase;
  cursor: pointer;
  font-family: 'Noto Sans KR', sans-serif;
}
.btn-save:hover { background: #f0ece8; }

/* ── 카드 전체 ── */
#card {
  max-width: 860px;
  margin: 0 auto;
  background: var(--paper);
  border: 2px solid var(--rule);
  padding: 0;
  font-family: 'Noto Serif KR', serif;
  color: var(--ink);
}

/* ── 마스트헤드 ── */
.masthead {
  border-bottom: 4px double var(--rule);
  padding: 16px 24px 12px;
  text-align: center;
  position: relative;
}
.masthead-eyebrow {
  font-size: 9px;
  letter-spacing: .22em;
  color: var(--sub);
  font-family: 'Noto Sans KR', sans-serif;
  text-transform: uppercase;
  margin-bottom: 4px;
}
.masthead-title {
  font-size: 26px;
  font-weight: 700;
  letter-spacing: .28em;
  color: var(--ink);
  line-height: 1;
}


/* ── 헤더 행 (아바타 + 닉네임 + 한줄소개) ── */
.hdr-row {
  display: grid;
  grid-template-columns: 3fr 7fr;
  border-bottom: 1px solid var(--rule);
}
.hdr-avatar-cell {
  border-right: 1px solid var(--rule);
  padding: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.avatar-box {
  width: 140px;
  height: 140px;
  border: 1.5px solid var(--rule);
  background: var(--tint2);
  cursor: pointer;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  flex-shrink: 0;
}
.avatar-box img { width: 100%; height: 100%; object-fit: cover; display: none; }
.avatar-hint { font-size: 9px; color: var(--muted); font-family: 'Noto Sans KR', sans-serif; text-align: center; line-height: 1.5; }
.avatar-box:hover::after {
  content: '업로드';
  position: absolute; inset: 0;
  background: rgba(0,0,0,.28);
  color: #fff;
  font-size: 10px;
  font-family: 'Noto Sans KR', sans-serif;
  display: flex; align-items: center; justify-content: center;
}
#avatarInput { display: none; }

.hdr-info-cell { padding: 14px 18px; display: flex; flex-direction: column; justify-content: center; gap: 6px; }
.hdr-nick-row { display: flex; flex-direction: column; gap: 6px; padding-bottom: 8px; }
.hdr-nick {
  font-size: 22px; font-weight: 700; color: var(--ink);
  border: none; background: transparent; outline: none;
  font-family: 'Noto Serif KR', serif;
  width: 100%; padding-bottom: 5px;
}
.hdr-nick::placeholder { color: var(--muted); opacity: .5; font-weight: 400; }
.hdr-meta { display: flex; gap: 0; align-items: stretch; }
.hdr-meta-item { display: flex; gap: 5px; align-items: center; padding: 3px 0; }
.hdr-meta-item.age    { flex: 4; padding-right: 10px; border-right: 1px solid var(--tint); white-space: nowrap; }
.hdr-meta-item.platform { flex: 6; padding-left: 10px; }
.hdr-meta-label { font-size: 9px; letter-spacing: .1em; color: var(--muted); font-family: 'Noto Sans KR', sans-serif; text-transform: uppercase; white-space: nowrap; }
.hdr-meta-input {
  border: none; border-bottom: 1px solid var(--tint); background: transparent; outline: none;
  font-family: 'Noto Sans KR', sans-serif; font-size: 12px; color: var(--ink);
  padding: 1px 2px; flex: 1; width: 0;
}
.hdr-intro {
  width: 100%; border: 1px solid var(--tint); background: var(--tint2); border-radius: 0;
  outline: none; font-family: 'Noto Sans KR', sans-serif; font-size: 11px; color: var(--ink);
  padding: 7px 9px; resize: none; line-height: 1.7;
}
.hdr-intro::placeholder { color: var(--muted); opacity: .7; }

/* ── 3단 메인 ── */
.body-cols {
  display: grid;
  grid-template-columns: 168px 1fr 1fr;
  border-bottom: 1px solid var(--rule);
}
.col {
  padding: 14px 15px;
  border-right: 1px solid var(--rule);
}
.col:last-child { border-right: none; }
.col-title {
  font-size: 9px; font-weight: 700; letter-spacing: .2em; text-transform: uppercase;
  color: var(--accent); font-family: 'Noto Sans KR', sans-serif;
  border-bottom: 1px solid var(--tint); padding-bottom: 5px; margin-bottom: 11px;
}

/* 블록 */
.blk { margin-bottom: 11px; }
.blk:last-child { margin-bottom: 0; }
.blk-label {
  font-size: 9px; letter-spacing: .1em; text-transform: uppercase;
  color: var(--muted); font-family: 'Noto Sans KR', sans-serif; margin-bottom: 4px;
}
.blk-field {
  width: 100%; border: none; border-bottom: 1px solid var(--tint);
  background: transparent; font-family: 'Noto Sans KR', sans-serif;
  font-size: 12px; color: var(--ink); padding: 2px 0; outline: none;
}
.blk-field:focus { border-bottom-color: var(--accent); }

/* 체크 리스트 */
.cklist { display: flex; flex-wrap: wrap; gap: 3px 10px; }
.ck {
  display: flex; align-items: center; gap: 4px;
  font-size: 11px; color: var(--ink); font-family: 'Noto Sans KR', sans-serif;
  cursor: pointer; user-select: none;
}
.ck-box {
  width: 11px; height: 11px;
  border: 1px solid var(--tint);
  display: inline-flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: background .1s, border-color .1s;
  font-size: 9px; color: transparent;
}
.ck.on .ck-box {
  background: var(--accent);
  border-color: var(--accent);
  color: var(--paper);
}
.ck.on .ck-box::after { content: '✓'; font-size: 8px; line-height: 1; }

/* 텍스트에어리어 */
.blk-ta {
  width: 100%; border: 1px solid var(--tint);
  background: var(--tint2); font-family: 'Noto Sans KR', sans-serif;
  font-size: 11px; color: var(--ink); padding: 7px 9px;
  outline: none; resize: none; line-height: 1.9;
  min-height: 52px;
}
.blk-ta:focus { border-color: var(--accent); }

.blk-div { height: 1px; background: var(--tint); margin: 9px 0; }

/* ── 하단 와이드 행 (자주 언급 + FREE) ── */
.wide-rows { border-bottom: 1px solid var(--rule); }
.wide-row {
  display: grid;
  grid-template-columns: 60px 1fr;
  border-bottom: 1px solid var(--tint);
}
.wide-row:last-child { border-bottom: none; }
.wide-row-label {
  padding: 11px 12px;
  border-right: 1px solid var(--tint);
  font-size: 9px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase;
  color: var(--accent); font-family: 'Noto Sans KR', sans-serif;
  display: flex; align-items: flex-start; padding-top: 13px;
}
.wide-row-input {
  padding: 10px 16px;
}
.wide-ta {
  width: 100%; border: none; background: transparent;
  font-family: 'Noto Sans KR', sans-serif; font-size: 12px; color: var(--ink);
  outline: none; resize: none; line-height: 1.9; min-height: 52px;
}
.wide-ta:focus { outline: none; }

/* ── 모바일 반응형 ── */
@media (max-width: 600px) {
  body { padding: 14px 10px 32px; }

  #ctrl { gap: 8px; }
  .btn-save { margin-left: 0; width: 100%; text-align: center; padding: 10px; font-size: 13px; }

  #card { border-width: 1.5px; }

  .masthead { padding: 12px 14px 10px; }
  .masthead-title { font-size: 20px; letter-spacing: .18em; }
  .masthead-eyebrow { font-size: 8px; }

  /* 헤더: 세로 */
  .hdr-row {
    grid-template-columns: 1fr;
  }
  .hdr-avatar-cell {
    border-right: none;
    border-bottom: 1px solid var(--rule);
    padding: 14px;
    justify-content: flex-start;
    gap: 14px;
    flex-direction: row;
    display: flex;
    align-items: center;
  }
  .hdr-info-cell { padding: 12px 14px; }
  .hdr-nick { font-size: 18px; }
  .hdr-meta { flex-direction: column; align-items: flex-start; gap: 6px; }
  .hdr-meta-item.age { flex: none; width: 100%; padding-right: 0; border-right: none; border-bottom: 1px solid var(--tint); padding-bottom: 6px; }
  .hdr-meta-item.platform { flex: none; width: 100%; padding-left: 0; }
  .hdr-meta-input { flex: 1; width: 0; }

  /* 본문: 3단 → 1단 세로 */
  .body-cols {
    grid-template-columns: 1fr;
  }
  .col {
    border-right: none;
    border-bottom: 1px solid var(--rule);
    padding: 14px;
  }
  .col:last-child { border-bottom: none; }

  /* 푸터 */
  .footer { flex-direction: column; align-items: flex-start; gap: 6px; padding: 10px 14px; }
  .footer-tag-input { width: 100%; }
}

.footer {
  padding: 8px 18px;
  display: flex; align-items: center; justify-content: space-between;
  border-top: 3px double var(--rule);
}
.footer-tag-input {
  border: none; background: transparent; outline: none;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 10px; color: var(--muted);
  width: 320px;
}
.footer-badge {
  font-size: 9px; letter-spacing: .18em; text-transform: uppercase;
  color: var(--sub); font-family: 'Noto Sans KR', sans-serif;
}
</style>
</head>
<body>

<!-- ── 컨트롤 ── -->
<div id="ctrl">
  <span class="ctrl-lbl">테마</span>
  <div class="tdots">
    <div class="tdot on"  data-t="default"  title="크림"></div>
    <div class="tdot"     data-t="rose"     title="로즈"></div>
    <div class="tdot"     data-t="lavender" title="라벤더"></div>
    <div class="tdot"     data-t="mint"     title="민트"></div>
    <div class="tdot"     data-t="peach"    title="피치"></div>
    <div class="tdot"     data-t="blue"     title="블루"></div>
    <div class="tdot"     data-t="mono"     title="모노"></div>
  </div>
  <button class="btn-save" onclick="saveCard()">↓ PNG 저장</button>
</div>

<!-- ── 카드 ── -->
<div id="card">

  <!-- 마스트헤드 -->
  <div class="masthead">
    <div class="masthead-eyebrow">Hetero · Profile Card</div>
    <div class="masthead-title">헤테로 자기소개표</div>
  </div>

  <!-- 헤더 행 -->
  <div class="hdr-row">
    <div class="hdr-avatar-cell">
      <div class="avatar-box" onclick="document.getElementById('avatarInput').click()">
        <img id="avatarImg" src="" alt="">
        <div class="avatar-hint" id="avatarHint">이미지<br>업로드</div>
      </div>
      <input type="file" id="avatarInput" accept="image/*">
    </div>
    <div class="hdr-info-cell">
      <div class="hdr-nick-row">
        <input class="hdr-nick" maxlength="20" placeholder="닉네임">
        <div class="hdr-meta">
          <div class="hdr-meta-item age">
            <span class="hdr-meta-label">연령대</span>
            <div class="cklist">
              <label class="ck"><span class="ck-box"></span>성인</label>
              <label class="ck"><span class="ck-box"></span>청소년</label>
              <label class="ck"><span class="ck-box"></span>비공개</label>
            </div>
          </div>
          <div class="hdr-meta-item platform">
            <span class="hdr-meta-label">플랫폼</span>
            <input class="hdr-meta-input" maxlength="40">
          </div>
        </div>
      </div>
      <textarea class="hdr-intro" rows="2" maxlength="120" placeholder="자기소개"></textarea>
    </div>
  </div>

  <!-- 3단 본문 -->
  <div class="body-cols">

    <!-- 왼쪽: 기본 정보 -->
    <div class="col">
      <div class="col-title">Profile</div>

      <div class="blk">
        <div class="blk-label">FUB FREE</div>
        <div class="cklist">
          <label class="ck"><span class="ck-box"></span>Y</label>
          <label class="ck"><span class="ck-box"></span>N</label>
        </div>
      </div>

      <div class="blk-div"></div>

      <div class="blk">
        <div class="blk-label">이별</div>
        <div class="cklist">
          <label class="ck"><span class="ck-box"></span>블락</label>
          <label class="ck"><span class="ck-box"></span>블블</label>
          <label class="ck"><span class="ck-box"></span>언팔</label>
        </div>
      </div>

      <div class="blk-div"></div>

      <div class="blk">
        <div class="blk-label">접속 시간대</div>
        <div class="cklist">
          <label class="ck"><span class="ck-box"></span>아침</label>
          <label class="ck"><span class="ck-box"></span>오전</label>
          <label class="ck"><span class="ck-box"></span>낮</label>
          <label class="ck"><span class="ck-box"></span>저녁</label>
          <label class="ck"><span class="ck-box"></span>밤</label>
          <label class="ck"><span class="ck-box"></span>새벽</label>
          <label class="ck"><span class="ck-box"></span>랜덤</label>
        </div>
      </div>

      <div class="blk-div"></div>

      <div class="blk">
        <div class="blk-label">트윗 성향</div>
        <div class="cklist">
          <label class="ck"><span class="ck-box"></span>일상</label>
          <label class="ck"><span class="ck-box"></span>앓이</label>
          <label class="ck"><span class="ck-box"></span>읽타</label>
          <label class="ck"><span class="ck-box"></span>후기</label>
          <label class="ck"><span class="ck-box"></span>그림</label>
          <label class="ck"><span class="ck-box"></span>글</label>
        </div>
      </div>

      <div class="blk-div"></div>

      <div class="blk">
        <div class="blk-label">타장르 언급</div>
        <div class="cklist">
          <label class="ck"><span class="ck-box"></span>Y</label>
          <label class="ck"><span class="ck-box"></span>N</label>
        </div>
      </div>

      <div class="blk">
        <div class="blk-label">스포</div>
        <div class="cklist">
          <label class="ck"><span class="ck-box"></span>Y</label>
          <label class="ck"><span class="ck-box"></span>N</label>
          <label class="ck"><span class="ck-box"></span>필터링</label>
        </div>
      </div>
    </div>

    <!-- 중간: 선호 소재/도식 + 지뢰 -->
    <div class="col">
      <div class="col-title">Preference &amp; NG</div>

      <div class="blk">
        <div class="blk-label">선호 소재</div>
        <textarea class="blk-ta" rows="2"></textarea>
      </div>

      <div class="blk">
        <div class="blk-label">선호 도식</div>
        <textarea class="blk-ta" rows="2"></textarea>
      </div>

      <div class="blk-div"></div>

      <div class="blk">
        <div class="blk-label">지뢰 / NG</div>
        <textarea class="blk-ta" rows="3"></textarea>
      </div>

      <div class="blk">
        <div class="blk-label">지뢰 대처</div>
        <div class="cklist">
          <label class="ck"><span class="ck-box"></span>뮤트</label>
          <label class="ck"><span class="ck-box"></span>블블</label>
          <label class="ck"><span class="ck-box"></span>블락</label>
        </div>
      </div>
    </div>

    <!-- 오른쪽: 자주 언급하는 작품 및 커플링 + FREE -->
    <div class="col">
      <div class="col-title">Genre &amp; Free</div>

      <div class="blk">
        <div class="blk-label">자주 언급하는 작품 및 커플링</div>
        <textarea class="blk-ta" rows="5"></textarea>
      </div>

      <div class="blk-div"></div>

      <div class="blk">
        <div class="blk-label">Free</div>
        <textarea class="blk-ta" rows="5"></textarea>
      </div>
    </div>

  </div><!-- body-cols -->

  <!-- 푸터 -->
  <div class="footer">
    <input class="footer-tag-input" maxlength="80">
    <div class="footer-badge">헤테로 자기소개표</div>
  </div>

</div><!-- card -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
// 테마
const themes = ['default','rose','lavender','mint','peach','mono'];
document.querySelectorAll('.tdot').forEach(d => {
  d.addEventListener('click', () => {
    document.querySelectorAll('.tdot').forEach(x => x.classList.remove('on'));
    d.classList.add('on');
    const card = document.getElementById('card');
    card.className = '';
    if (d.dataset.t !== 'default') card.classList.add('t-' + d.dataset.t);
  });
});

// 체크박스
document.querySelectorAll('.ck').forEach(ck => {
  ck.addEventListener('click', () => ck.classList.toggle('on'));
});

// 아바타
document.getElementById('avatarInput').addEventListener('change', function () {
  const f = this.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = e => {
    const img = document.getElementById('avatarImg');
    img.src = e.target.result;
    img.style.display = 'block';
    document.getElementById('avatarHint').style.display = 'none';
  };
  r.readAsDataURL(f);
});

// PNG 저장 — 항상 PC 가로 버전(860px)으로 캡처
function saveCard() {
  const card = document.getElementById('card');

  // 카드 복제
  const clone = card.cloneNode(true);
  clone.style.cssText = [
    'position:fixed',
    'top:-9999px',
    'left:-9999px',
    'width:860px',
    'max-width:860px',
    // 3단 그리드 강제
  ].join(';');

  // 복제본 안의 모바일 스타일 강제 해제 — PC 레이아웃 주입
  const overrideStyle = document.createElement('style');
  overrideStyle.textContent = `
    .hdr-row { display: grid !important; grid-template-columns: 3fr 7fr !important; }
    .hdr-avatar-cell { border-right: 1px solid var(--rule) !important; border-bottom: none !important; flex-direction: column !important; justify-content: center !important; }
    .hdr-info-cell { padding: 14px 18px !important; }
    .hdr-nick { font-size: 22px !important; }
    .hdr-meta { flex-direction: row !important; align-items: stretch !important; gap: 0 !important; }
    .hdr-meta-item.age { flex: 3 !important; padding-right: 10px !important; border-right: 1px solid var(--tint) !important; width: auto !important; }
    .hdr-meta-item.platform { flex: 7 !important; padding-left: 10px !important; width: auto !important; }
    .hdr-meta-input { flex: 1 !important; width: 0 !important; }
    .body-cols { display: grid !important; grid-template-columns: 168px 1fr 1fr !important; }
    .col { border-right: 1px solid var(--rule) !important; border-bottom: none !important; }
    .col:last-child { border-right: none !important; }
    .footer { flex-direction: row !important; align-items: center !important; }
    .footer-tag-input { width: 320px !important; }
  `;
  clone.appendChild(overrideStyle);

  // input/textarea 값 span으로 교체 (글자 꺼짐 방지)
  const origInputs = card.querySelectorAll('input, textarea');
  const cloneInputs = clone.querySelectorAll('input, textarea');
  cloneInputs.forEach((el, i) => {
    const orig = origInputs[i];
    const val = orig ? orig.value : el.value;
    const cs = window.getComputedStyle(orig || el);
    const span = document.createElement('span');
    span.textContent = val;
    span.style.cssText = [
      'display:inline-block',
      'font-family:' + cs.fontFamily,
      'font-size:' + cs.fontSize,
      'font-weight:' + cs.fontWeight,
      'color:' + cs.color,
      'letter-spacing:' + cs.letterSpacing,
      'line-height:' + cs.lineHeight,
      'width:' + cs.width,
      'min-height:' + cs.height,
      'padding:' + cs.padding,
      'white-space:pre-wrap',
      'word-break:break-all',
      'vertical-align:middle',
      'border-bottom:' + cs.borderBottom,
      'background:transparent',
    ].join(';');
    el.parentNode.insertBefore(span, el);
    el.remove();
  });

  document.body.appendChild(clone);

  html2canvas(clone, {
    scale: 3,
    useCORS: true,
    backgroundColor: null,
    logging: false,
    width: 860,
    windowWidth: 860,
  }).then(canvas => {
    clone.remove();
    const a = document.createElement('a');
    a.download = 'hetero_trchinso.png';
    a.href = canvas.toDataURL('image/png');
    a.click();
  }).catch(() => clone.remove());
}
</script>
</body>
</html>
